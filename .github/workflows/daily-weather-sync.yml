name: Daily Weather Data Sync

on:
  schedule:
    # 毎日 JST 15:00 (UTC 6:00) に実行 - 前日と前々日の天気を同期
    # 注: JST 8:00では気象庁サイトの前日天気概況データが未公開のため、午後に変更
    - cron: '0 6 * * *'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      start_date:
        description: '開始日 (YYYY-MM-DD形式、省略時は前々日)'
        required: false
        type: string
      end_date:
        description: '終了日 (YYYY-MM-DD形式、省略時は前日)'
        required: false
        type: string

jobs:
  sync-weather-data:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 依存関係のインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 天気データの同期
        env:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: |
          # 処理対象日付の決定
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            # 手動実行時：指定された日付を使用
            START_DATE="${{ github.event.inputs.start_date }}"
            echo "手動実行: 開始日 $START_DATE を処理します"
            
            if [ -n "${{ github.event.inputs.end_date }}" ]; then
              END_DATE="${{ github.event.inputs.end_date }}"
              echo "終了日: $END_DATE"
            else
              END_DATE="$START_DATE"
              echo "終了日が指定されていないため、開始日と同じにします"
            fi
          else
            # 定期実行時：JST基準で前日と前々日の日付を計算
            # UTC 6:00 = JST 15:00 なので、JST基準で前日・前々日を取得
            START_DATE=$(TZ='Asia/Tokyo' date -d '2 days ago' +'%Y-%m-%d')
            END_DATE=$(TZ='Asia/Tokyo' date -d 'yesterday' +'%Y-%m-%d')
            echo "定期実行: JST基準で前々日 ($START_DATE) から前日 ($END_DATE) までを処理します"
          fi

          # スクリプト実行
          cd src/weather
          echo "天気データ同期を開始します..."
          python update_weather.py "$START_DATE" "$END_DATE" --yes

          if [ $? -eq 0 ]; then
            echo "✅ 天気データの同期が正常に完了しました"
          else
            echo "❌ 天気データの同期に失敗しました"
            exit 1
          fi

      - name: 実行結果の通知
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "🎉 Weather Data Sync: 成功"
          else
            echo "💥 Weather Data Sync: 失敗 - 管理者に通知されます"
          fi
